name = "letsplay-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[durable_objects]
bindings = [
  { name = "CHAT_ROOM", class_name = "ChatRoom" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatRoom"]

[[d1_databases]]
binding = "DB"
database_name = "letsplay-db"
database_id = "66a364d6-b00a-42df-b1b4-004e284dd686"

# Uncomment when R2 is enabled on your account:
# [[r2_buckets]]
# binding = "MEDIA"
# bucket_name = "letsplay-media"

[vars]
ALLOWED_ORIGIN = "*"
# Tighten this after you deploy to Vercel:
# ALLOWED_ORIGIN = "https://your-app.vercel.app,http://localhost:3000"
# INTERNAL_SECRET = "" # Set via: wrangler secret put INTERNAL_SECRET
